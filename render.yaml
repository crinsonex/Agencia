services:
  - type: web
    name: agencia-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd 'Projeto Agencia' && gunicorn server:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
