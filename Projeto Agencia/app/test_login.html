<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f5f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: #fff; border-radius: 20px; padding: 48px 40px; width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
h2 { color: #4f46e5; margin-bottom: 4px; }
p { color: #888; font-size: 14px; margin-bottom: 28px; }
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
input[type=text], input[type=password] {
  width: 100%; padding: 10px 14px; border: 1px solid #e8e8e3; border-radius: 10px;
  font-size: 14px; margin-bottom: 16px; outline: none; background: #fafafa;
}
input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
button {
  width: 100%; padding: 12px; background: #4f46e5; color: #fff; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
}
.error { color: #dc2626; font-size: 13px; margin-top: 8px; display: none; }
#debug { margin-top: 16px; font-size: 12px; color: #888; word-break: break-all; white-space: pre; }
</style>
</head>
<body>
<div class="card">
  <h2>Test Login</h2>
  <p>Debug - hash simples</p>
  <form id="login-form">
    <label>Usuario</label>
    <input type="text" id="login-user" value="admin">
    <label>Senha</label>
    <input type="password" id="login-pass" value="admin">
    <button type="submit">Entrar</button>
    <div class="error" id="login-error"></div>
  </form>
  <div id="debug"></div>
</div>

<script>
function hashPassword(text) {
    var h = 5381;
    for (var i = 0; i < text.length; i++) {
        h = ((h << 5) + h) + text.charCodeAt(i);
        h = h & h;
    }
    return Math.abs(h).toString(36);
}

var USERS_KEY = 'test_users';
var SESSION_KEY = 'test_session';

// Init default admin
function initUsers() {
    var users = localStorage.getItem(USERS_KEY);
    if (!users) {
        var adminHash = hashPassword('admin');
        var defaults = { 'admin': { password: adminHash, role: 'admin' } };
        localStorage.setItem(USERS_KEY, JSON.stringify(defaults));
        return 'Criado admin com hash: ' + adminHash;
    }
    var parsed = JSON.parse(users);
    return 'Usuarios existentes:\n' + JSON.stringify(parsed, null, 2) +
           '\n\nHash de "admin" neste navegador: ' + hashPassword('admin');
}

function login(username, password) {
    var users = JSON.parse(localStorage.getItem(USERS_KEY));
    var user = users[username];
    if (!user) return false;
    return hashPassword(password) === user.password;
}

var debug = document.getElementById('debug');
var initMsg = initUsers();
debug.textContent = initMsg;

document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var username = document.getElementById('login-user').value.trim();
    var password = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');

    errEl.style.display = 'none';

    debug.textContent += '\n\nTentando login: user="' + username + '" pass="' + password + '"';
    debug.textContent += '\nInput hash: ' + hashPassword(password);

    var users = JSON.parse(localStorage.getItem(USERS_KEY));
    debug.textContent += '\nStored hash: ' + (users[username] ? users[username].password : 'user not found');

    var success = login(username, password);
    debug.textContent += '\nResult: ' + success;

    if (success) {
        errEl.textContent = 'LOGIN OK! Redirecionando...';
        errEl.style.color = '#15803d';
        errEl.style.display = 'block';
    } else {
        errEl.textContent = 'Usuario ou senha invalidos.';
        errEl.style.color = '#dc2626';
        errEl.style.display = 'block';
    }
});
</script>
</body>
</html>
